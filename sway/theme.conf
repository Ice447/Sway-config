# Static theme colors preserved from the previous wallpaper theme.

# Wallpaper
output * bg "/home/ice/.wallpaper/background.png" fill

# Window shape and spacing
corner_radius 6
default_border pixel 2
gaps outer 2

# Colors
set $bg_color          #1d2024
set $inactive_bg_color #191c20
set $text_color        #e2e2e9
set $text_dark         #09305f
set $accent_color      #a9c7ff
set $accent_bg_color   #282a2f
set $urgent_color      #ffb4ab

# Window borders
# Class                  Border              Background          Text         Indicator           Child border
client.focused           $accent_color       $accent_bg_color    $text_color  $accent_color       $accent_color
client.focused_inactive  $bg_color           $bg_color           $text_color  $bg_color           $bg_color
client.unfocused         $inactive_bg_color  $inactive_bg_color  $text_color  $inactive_bg_color  $inactive_bg_color
client.urgent            $urgent_color       $accent_bg_color    $text_color  $urgent_color       $urgent_color
