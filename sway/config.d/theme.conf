# Generated by matugen from ~/.wallpaper/background.png

# Wallpaper
output * bg "~/.wallpaper/background.png" fill

# Window shape and spacing
corner_radius 6
default_border pixel 2
gaps outer 2

# Colors
set $bg_color          #271d1c
set $inactive_bg_color #231918
set $text_color        #f1dedc
set $text_dark         #561e18
set $accent_color      #ffb4aa
set $urgent_color      #ffb4ab

# Window borders
# Class                  Border              Background          Text         Indicator           Child border
client.focused           $accent_color       $accent_color       $text_dark   $accent_color       $accent_color
client.focused_inactive  $bg_color           $bg_color           $text_color  $bg_color           $bg_color
client.unfocused         $inactive_bg_color  $inactive_bg_color  $text_color  $inactive_bg_color  $inactive_bg_color
client.urgent            $urgent_color       $urgent_color       $text_dark   $urgent_color       $urgent_color
