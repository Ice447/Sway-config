# Status bar
exec_always --no-startup-id sh -c 'pkill -x waybar; waybar'

# Session environment for apps started from systemd/dbus activation
exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
exec --no-startup-id sh -c 'sleep 1; ~/.config/waybar/scripts/system/restore_bluetooth.sh'

# Foreground apps
exec firefox

# Scratchpad app rules
for_window [class="Spotify"] move scratchpad
for_window [app_id="elecwhat"] move scratchpad
for_window [app_id="vesktop"] move scratchpad

# Background apps
exec --no-startup-id spotify --tray
exec --no-startup-id sh -c 'sleep 2; elecwhat --tray'
exec --no-startup-id sh -c 'sleep 2; vesktop --tray'

# Scratchpad bindings
bindsym $mod+period [class="Spotify"] scratchpad show, move position 0 0, resize set 100 ppt 100 ppt
bindsym $mod+shift+comma [app_id="elecwhat"] scratchpad show, move position 0 0, resize set 100 ppt 100 ppt
bindsym $mod+comma [app_id="vesktop"] scratchpad show, move position 0 0, resize set 100 ppt 100 ppt

# Daemons
exec --no-startup-id gnome-keyring-daemon --start --components=secrets
exec --no-startup-id ~/.config/matugen/scripts/apply-wallpaper-theme.sh

# Clipboard history
exec wl-paste --type text --watch cliphist store
exec wl-paste --type image --watch cliphist store
